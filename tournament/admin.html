<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Admin | Crossword Nexus</title>
    <link rel="stylesheet" href="../css/crossword.shared.css">
    <link rel="stylesheet" href="tournament.css">
    <link rel="stylesheet" href="admin.css">
    <script src="../lib/jquery.js"></script>
</head>
<body>
    <div id="admin-login" class="setup-container" style="display:none; margin-top:100px">
        <h2>Admin Login</h2>
        <p>Please sign in to access the tournament dashboard.</p>
        <div id="loginError" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" required style="width:100%; padding:12px; border:2px solid #ddd; border-radius:6px;">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" required style="width:100%; padding:12px; border:2px solid #ddd; border-radius:6px;">
            </div>
            <div class="setup-actions">
                <button type="submit" class="primary-btn">Sign In</button>
            </div>
        </form>
    </div>

    <div id="admin-app" style="display:none">
        <header class="admin-header">
            <h1>Tournament Admin</h1>
            <nav class="admin-nav">
                <button data-tab="puzzles" class="tab-btn active">Puzzles</button>
                <button data-tab="divisions" class="tab-btn">Divisions</button>
                <button data-tab="settings" class="tab-btn">Settings</button>
                <button data-tab="results" class="tab-btn">Results</button>
                <a href="tournament.html" class="secondary-btn">View Solver</a>
            </nav>
        </header>

        <main id="admin-content" class="admin-main">
            <div class="loading">Loading admin dashboard...</div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Admin Logic -->
    <script src="admin.js"></script>
</body>
</html>
