<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Admin | Crossword Nexus</title>
    <link rel="stylesheet" href="../css/crossword.shared.css">
    <link rel="stylesheet" href="tournament.css">
    <link rel="stylesheet" href="admin.css">
    <script src="../lib/jquery.js"></script>
</head>
<body>
    <div id="admin-login" class="setup-container" style="display:none; margin-top:100px">
        <h2>Admin Login</h2>
        <p>Please sign in with your authorized Google account to access the tournament dashboard.</p>
        <div id="loginError" class="error-message"></div>
        <div class="setup-actions">
            <button id="googleSignInBtn" class="primary-btn" style="background-color: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="white"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.91c1.7-1.56 2.68-3.86 2.68-6.6z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.25c-.81.54-1.85.87-3.05.87-2.34 0-4.33-1.58-5.03-3.71H.95v2.3C2.43 15.89 5.5 18 9 18z" fill="#34A853"/><path d="M3.97 10.73c-.18-.54-.28-1.12-.28-1.73s.1-1.19.28-1.73V4.97H.95C.35 6.19 0 7.56 0 9s.35 2.81.95 4.03l3.02-2.3z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.47.89 11.43 0 9 0 5.5 0 2.43 2.11.95 5.11l3.02 2.3c.7-2.13 2.69-3.71 5.03-3.71z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="admin-app" style="display:none">
        <header class="admin-header">
            <h1>Tournament Admin</h1>
            <nav class="admin-nav">
                <button data-tab="puzzles" class="tab-btn active">Puzzles</button>
                <button data-tab="participants" class="tab-btn">Participants</button>
                <button data-tab="divisions" class="tab-btn">Divisions</button>
                <button data-tab="settings" class="tab-btn">Settings</button>
                <button data-tab="results" class="tab-btn">Results</button>
                <a href="tournament.html" class="secondary-btn">View Solver</a>
                <button id="adminSignOutBtn" class="secondary-btn btn-danger">Sign Out</button>
            </nav>
        </header>

        <main id="admin-content" class="admin-main">
            <div class="loading">Loading admin dashboard...</div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Admin Logic -->
    <script src="admin.js"></script>
</body>
</html>
